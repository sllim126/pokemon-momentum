  <style>
    @page {

    .sheet {
      width: 8.5in;
      min-height: 11in;
      margin: 0 auto;
      padding: 0.5in;
      background: white;
      display: grid;
      grid-template-columns: repeat(3, 2.5in);
      grid-auto-rows: 3.5in;
      align-content: start;
    }
    .card {
      width: 2.5in;

      padding: 0.24in 0.14in;
      text-align: center;
      break-inside: avoid;
      page-break-inside: avoid;
      overflow: hidden;
    }
    .line {
      width: 100%;
      overflow-wrap: normal;
      text-wrap: balance;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }
    .line-name {
      font-size: 25pt;
      max-width: 2.18in;
    }
    .line-number {
      font-size: 11pt;
      letter-spacing: 0;
    }
    .line-variant {
      font-size: 22pt;
      max-width: 2.2in;
    }
    .line-region {
      font-size: 13pt;
    }
    .line-tight {
      font-size: 21pt;
    }
    .line-tighter {
      font-size: 18pt;
    }
    .line-tightest {
      font-size: 15pt;
      line-height: 1.04;
    }
    @media print {
      body {
        background: white;
      }
      .sheet {
        margin: 0;
      }
    }
  </style>
</head>
