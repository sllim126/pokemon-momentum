<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>mega_placeholders: WHT</title>
  <style>
    @page {
      size: letter;
      margin: 0.5in;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #f3f4f6;
      color: #111;
      font-family: "Agency FB", "Arial Narrow", "Roboto Condensed", "Impact", sans-serif;
    }
    .sheet {
      width: 8.5in;
      min-height: 11in;
      margin: 0 auto;
      padding: 0.5in;
      background: white;
      display: grid;
      grid-template-columns: repeat(3, 2.5in);
      grid-auto-rows: 3.5in;
      align-content: start;
    }
    .card {
      width: 2.5in;
      height: 3.5in;
      border: 1px dotted #d9dee7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.16in;
      padding: 0.24in 0.14in;
      text-align: center;
      break-inside: avoid;
      page-break-inside: avoid;
      overflow: hidden;
    }
    .line {
      width: 100%;
      overflow-wrap: normal;
      text-wrap: balance;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }
    .line-name {
      font-size: 25pt;
      max-width: 2.18in;
    }
    .line-number {
      font-size: 11pt;
      letter-spacing: 0;
    }
    .line-variant {
      font-size: 22pt;
      max-width: 2.2in;
    }
    .line-region {
      font-size: 13pt;
    }
    .line-tight {
      font-size: 21pt;
    }
    .line-tighter {
      font-size: 18pt;
    }
    .line-tightest {
      font-size: 15pt;
      line-height: 1.04;
    }
    @media print {
      body {
        background: white;
      }
      .sheet {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <main class="sheet">
    <section class="card" title="Rows prize_pack_series8.csv:11 | WHT013 | Official card list; two checkbox marks extracted"><div class="line line-name">Emboar</div>
<div class="line line-number">WHT013</div>
<div class="line line-variant">Play Pokemon Stamp</div></section><section class="card" title="Rows prize_pack_series8.csv:42 | WHT020 | Official card list; one checkbox mark extracted"><div class="line line-name">Reshiram ex</div>
<div class="line line-number">WHT020</div>
<div class="line line-variant">Play Pokemon Stamp</div></section><section class="card" title="Rows mega_placeholders.csv:132 | WHT051 | White Flare reprint"><div class="line line-name">Archeops</div>
<div class="line line-number">WHT051</div>
<div class="line line-variant line-tight">Excavator Pikachu Stamp</div></section>
  </main>
</body>
</html>
